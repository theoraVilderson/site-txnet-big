global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # تنظیم تارگت‌های اصلی پروژه شما
  - job_name: "txnet_production"
    static_configs:
      - targets: ["prodtxnet_backend:3000", "prodtxnet_go_worker:8080"]

  - job_name: "txnet_development"
    static_configs:
      - targets: ["devtxnet_backend:3000", "devtxnet_go_worker:8080"]
