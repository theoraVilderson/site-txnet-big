  #     networks:
  #       - ${ENVIRONMENT}_gateway_network
  #   # هیچ پورتی به بیرون مپ نمی‌شود
  #   labels:
  #     - "traefik.enable=true"

  #     # ۱. تنظیم روتر برای دامنه اصلی (اجبار به استفاده از درگاه امن websecure)
