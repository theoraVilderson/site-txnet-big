services:
  gateway-handler:
    image: ${DOCKER_REGISTRY}/traefik:v3.7
    container_name: traefik
    command:
      - "--api.dashboard=true" # فعال‌سازی داشبورد (داخلی)
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      # تعریف درگاه‌های ورود
      - "--entrypoints.web.address=:${TXNET_SITE_HTTP_PORT}"
      - "--entrypoints.websecure.address=:${TXNET_SITE_HTTPS_PORT}"
      # تنظیمات Let's Encrypt
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=${EMAIL_SSL}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "${TXNET_SITE_HTTP_PORT}:${TXNET_SITE_HTTP_PORT}"
      - "${TXNET_SITE_HTTPS_PORT}:${TXNET_SITE_HTTPS_PORT}"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./${ENVIRONMENT}_letsencrypt:/letsencrypt

    networks:
      - public_gateway_network
      - private_backend_network
    labels:
      - "traefik.enable=true"

      # ==========================================
      # ۱. تنظیمات داشبورد برای مسیر HTTP (پورت 80)
      # ==========================================
      # نکته: داشبورد ترافیک برای کار کردن به دو مسیر /api و /dashboard نیاز دارد
      - "traefik.http.routers.dashboard-http.rule=Host(`monitor.yourdomain.com`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))"
      - "traefik.http.routers.dashboard-http.entrypoints=web"
      - "traefik.http.routers.dashboard-http.service=api@internal"
      - "traefik.http.routers.dashboard-http.middlewares=auth-dashboard"

      # ==========================================
      # ۲. تنظیمات داشبورد برای مسیر HTTPS (پورت 443)
      # ==========================================
      - "traefik.http.routers.dashboard-https.rule=Host(`monitor.yourdomain.com`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))"
      - "traefik.http.routers.dashboard-https.entrypoints=websecure"
      - "traefik.http.routers.dashboard-https.tls.certresolver=myresolver" # درخواست گواهینامه SSL
      - "traefik.http.routers.dashboard-https.service=api@internal"
      - "traefik.http.routers.dashboard-https.middlewares=auth-dashboard"

      # ==========================================
      # ۳. میدل‌ور احراز هویت (Basic Auth مشترک برای هر دو روتر)
      # ==========================================
      - "traefik.http.middlewares.auth-dashboard.basicauth.users=${TRAEFIK_PANEL_USERNAME}:${TRAEFIK_PANEL_PASSWORD}"
  authorization-handler:
    build:
      context: ./authorization-handler
      dockerfile: Dockerfile
      # این خط به داکر می‌گوید: فقط تا مرحله dev در داکر فایل پیش برو
      target: ${ENVIRONMENT}
    container_name: go-authorization-handler
      - "traefik.enable=true"
    labels:
      # تعریف Middleware احراز هویت
      - "traefik.http.middlewares.my-auth.forwardauth.address=http://authorization-handler:${INTERAL_BACKEND_PORT}/validate"
      # هدرهایی که از سرویس Go گرفته شده و به بک‌اند تزریق می‌شوند (حیاتی برای Trust Boundary)
      - "traefik.http.middlewares.my-auth.forwardauth.authResponseHeaders=X-User-Id,X-Actor-IdوX-User-Permissons"

      # (اختیاری) میدلوری برای پاک کردن هدرهای جعلی که کلاینت فرستاده است قبل از رسیدن به Auth
      - "traefik.http.middlewares.strip-fake-headers.headers.customrequestheaders.X-User-Id="
      - "traefik.http.middlewares.strip-fake-headers.headers.customrequestheaders.X-Actor-Id="
      - "traefik.http.middlewares.strip-fake-headers.headers.customrequestheaders.X-User-Permissons="
    # مپ کردن سورس کد برای Hot-Reload
    volumes:
      - authorization-handler:/app
    environment:
      - APP_ENV=${ENVIRONMENT}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - private_backend_network
