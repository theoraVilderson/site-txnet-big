  authentication-handler:
    networks:
      - ${ENVIRONMENT}_private_backend_network
  memory-data:
    image: ${DOCKER_REGISTRY}/redis:8.8-alpine
    container_name: redis
    command: redis-server --save "" --requirepass ${REDIS_PASSWORD} --appendonly yes --appendfsync everysec

    volumes:
      - redis_vol_internal:/data
    networks:
      - private_backend_network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  main-db:
    image: ${DOCKER_REGISTRY}/postgres:18-alpine # استفاده از نسخه سبک و بهینه alpine
    container_name: postgres-db
    restart: always # در صورت کرش یا ری‌استارت سرور، دیتابیس خودکار بالا بیاید
    environment:
      - POSTGRES_USER=${MAIN_DB_USERNAME}
      - POSTGRES_PASSWORD=${MAIN_DB_PASSWORD}
      - POSTGRES_DB=${MAIN_DB_NAME}
    volumes:
      # ۱. حیاتی‌ترین بخش: ذخیره دیتای واقعی روی هارد سرور برای جلوگیری از پاک شدن داده‌ها
      - postgres_data:/var/lib/postgresql/data
    networks:
      - private_backend_network
      # ۲. مدیریت پورت طبق استاندارد لوکال (در پروداکشن این دو خط را کامنت یا حذف کنید)
  rabbitmq:
    image: rabbitmq:4.2-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}!
    ports:
      - "5672:5672" # پورت اصلی ارتباط سرویس‌ها (AMQP)
      - "15672:15672" # پورت پنل مدیریت تحت وب
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - private_backend_network
volumes:
  txnetweb_db:
  txnetweb_log:
  redis_vol_internal:
  txnetweb_dbconfig:
  postgres_data:
  authorization-handler:
  rabbitmq_data:
networks:
  public_gateway_network:
    driver: bridge
  private_backend_network:
    driver: bridge
    internal: true # این شبکه به اینترنت دسترسی مستقیم
